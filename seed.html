// ── Seed functions ────────────────────────────────────────

function log(msg, type = 'info') {
  const el = document.createElement('div');
  const color = type === 'ok' ? 'var(--green)' : type === 'error' ? 'var(--coral)' : 'var(--text-secondary)';
  el.style.cssText = `font-size:.85rem;color:${color};`;
  el.textContent = msg;
  document.getElementById('log').appendChild(el);
}

async function clearCollection(name) {
  const snap = await getDocs(query(collection(db, name)));
  await Promise.all(snap.docs.map(d => deleteDoc(doc(db, name, d.id))));
  log(`  Cleared ${snap.size} existing docs from ${name}`);
}

async function seedAll() {
  const btn = document.getElementById('seedBtn');
  btn.disabled = true;
  btn.textContent = 'Seeding…';
  document.getElementById('log').innerHTML = '';

  try {
    // 1. Tank profile
    log('→ Saving tank profile…');
    await setDoc(doc(db, 'reef_settings', 'tank_profile'), TANK_PROFILE);
    log('  ✓ tank_profile', 'ok');

    // 2. Lighting settings
    log('→ Saving lighting settings…');
    await setDoc(doc(db, 'reef_settings', 'lighting'), LIGHTING_SETTINGS);
    log('  ✓ lighting', 'ok');

    // 3. RODI settings
    log('→ Saving RODI settings…');
    await setDoc(doc(db, 'reef_settings', 'rodi'), RODI_SETTINGS);
    log('  ✓ rodi', 'ok');

    // 4. Substrate & rock
    log('→ Saving substrate & rock…');
    await setDoc(doc(db, 'reef_settings', 'substrate'), SUBSTRATE_SETTINGS);
    log('  ✓ substrate', 'ok');

    // 5. Salt & water change
    log('→ Saving salt & water change settings…');
    await setDoc(doc(db, 'reef_settings', 'salt'), SALT_SETTINGS);
    log('  ✓ salt', 'ok');

    // 6. ATO settings
    log('→ Saving ATO settings…');
    await setDoc(doc(db, 'reef_settings', 'ato'), ATO_SETTINGS);
    log('  ✓ ato', 'ok');

    // 7. Safety
    log('→ Saving safety settings…');
    await setDoc(doc(db, 'reef_settings', 'safety'), SAFETY_SETTINGS);
    log('  ✓ safety', 'ok');

    // 8. Stand
    log('→ Saving stand info…');
    await setDoc(doc(db, 'reef_settings', 'stand'), STAND_SETTINGS);
    log('  ✓ stand', 'ok');

    // 9. Equipment — clear old and re-seed
    log('→ Seeding equipment…');
    await clearCollection('reef_equipment');
    for (const equip of EQUIPMENT) {
      await addDoc(collection(db, 'reef_equipment'), equip);
      log(`  ✓ ${equip.name}`, 'ok');
    }

    log('');
    log('✅ All data seeded successfully! Redirecting to dashboard…', 'ok');
    setTimeout(() => location.href = 'index.html', 2000);

  } catch (err) {
    log('❌ Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '🌱 Retry Seed';
  }
}

// Preview what will be seeded
const preview = document.getElementById('preview');
[

  `RODI system → reef_settings/rodi`,
  `Substrate & rock → reef_settings/substrate`,
  `Salt & water change settings → reef_settings/salt`,
  `ATO system → reef_settings/ato`,
  `Safety info → reef_settings/safety`,
  `Stand info → reef_settings/stand`,
  `${EQUIPMENT.length} equipment items → reef_equipment (replaces existing)`,
].forEach(line => {
  const el = document.createElement('div');
  el.className = 'alert alert-info text-sm';
  el.textContent = '📦 ' + line;
  preview.appendChild(el);
});

document.getElementById('seedBtn').addEventListener('click', seedAll);
